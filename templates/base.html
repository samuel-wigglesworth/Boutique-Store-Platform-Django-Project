<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fb; color: #222; }
        header { background: #1d1b2f; color: #fff; padding: 1rem 2rem; }
        nav a { color: #fff; margin-right: 1rem; text-decoration: none; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #fff; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .btn { display: inline-block; padding: 0.45rem 0.8rem; background: #3f51b5; color: #fff; text-decoration: none; border-radius: 6px; border: 0; }
        input, textarea, select { width: 100%; margin: 0.35rem 0 0.8rem; padding: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 0.6rem; text-align: left; }
    </style>
</head>
<body>
    <header>
        <h2>Boutique Fashion Platform</h2>
        <nav>
            <a href="{% url 'dashboard:home' %}">Home</a>
            <a href="{% url 'catalog:product_list' %}">Catalog</a>
            <a href="{% url 'orders:cart' %}">Cart</a>
            {% if user.is_authenticated %}
                <a href="{% url 'orders:order_list' %}">Orders</a>
                <a href="{% url 'accounts:profile' %}">Profile</a>
                {% if user.is_staff %}
                    <a href="{% url 'reports:sales_report' %}">Reports</a>
                    <a href="/admin/">Admin</a>
                {% endif %}
                <a href="{% url 'accounts:logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:signup' %}">Sign Up</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
